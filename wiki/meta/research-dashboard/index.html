  <script>
    const state = { data: null, selected: null, quotes: new Map(), quoteFailed: false };
    const labelMap = { undervalued: "低於買區", reasonable: "合理區間", expensive: "偏貴", unable_to_classify_price: "無法判定" };
    const gateLabelMap = {
      needs_refresh_before_decision: "需要更新後才能判斷",
      wait_for_buy_zone: "等待合理價格",
      ready_for_linter_review: "進一步檢查中",
      buy_now: "買進建議"
    };
    const esc = value => String(value ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
    async function loadData() {
      const inline = document.getElementById("dashboard-data-inline").textContent.trim();
      state.data = inline ? JSON.parse(inline) : null;
      if (!state.data || !state.data.companies?.length) {
        const res = await fetch("dashboard-data.json", { cache: "no-store" });
        state.data = await res.json();
      }
      renderSummary();
      renderCards();
      refreshQuotes();
    }
    function renderSummary() {
      const summary = state.data.summary || {};
      const buyNow = summary.buy_now_gate_tickers || [];
      document.getElementById("summary").innerHTML = `<div class="summary-row">
        <div class="summary-cell"><span class="subtle">公司頁</span><b>${esc(summary.company_count || 0)}</b></div>
        <div class="summary-cell"><span class="subtle">需要刷新</span><b>${esc(summary.needs_refresh_count || 0)}</b></div>
        <div class="summary-cell"><span class="subtle">價格無法判定</span><b>${esc(summary.unable_to_classify_price_count || 0)}</b></div>
        <div class="summary-cell"><span class="subtle">買進建議</span><b>${esc(buyNow.length)}</b></div>
      </div>`;
    }
    function filteredCompanies() {
      const q = document.getElementById("search").value.trim().toLowerCase();
      const market = document.getElementById("market").value;
      const status = document.getElementById("status").value;
      return state.data.companies.filter(item => {
        const haystack = [item.ticker, item.company_name, ...(item.themes || [])].join(" ").toLowerCase();
        return (!q || haystack.includes(q)) && (!market || item.market === market) && (!status || item.data_status === status);
      });
    }
    function tagClass(value) {
      if (String(value).includes("refresh") || String(value).includes("unable")) return "warn";
      if (String(value).includes("current") || String(value).includes("reasonable")) return "ok";
      if (String(value).includes("expensive") || String(value).includes("stale")) return "bad";
      return "";
    }
    function quoteLabel(item) {
      const quote = state.quotes.get(item.ticker);
      if (quote && quote.status === "ok") return `${quote.price} ${quote.currency}`;
      return state.quoteFailed ? "live_price_unavailable" : "latest_price_pending";
    }
    function quoteDetail(item) {
      const quote = state.quotes.get(item.ticker);
      if (quote && quote.status === "ok") return `${quote.price} ${quote.currency} as_of ${quote.as_of || "unknown"}`;
      return state.quoteFailed ? "live_price_unavailable" : "latest_price_pending";
    }
    function renderCards() {
      const root = document.getElementById("cards");
      const items = filteredCompanies();
      root.innerHTML = "";
      if (!items.length) {
        root.innerHTML = `<div class="empty">沒有符合條件的研究項目。請放寬搜尋或篩選。</div>`;
        return;
      }
      for (const item of items) {
        const button = document.createElement("button");
        button.className = "card";
        button.onclick = () => { state.selected = item; renderDetail(item); };
        button.innerHTML = `<div class="ticker">${esc(item.ticker)}</div>
          <div class="subtle">${esc(item.company_name)}</div>
          <div class="score">${esc(item.buy_value_score)}<span class="subtle"> / 100</span></div>
          <div class="tags">
            <span class="tag">${esc(item.score_confidence)}</span>
            <span class="tag ${tagClass(item.price_position_snapshot)}">${esc(labelMap[item.price_position_snapshot] || item.price_position_snapshot)}</span>
            <span class="tag ${tagClass(item.decision_gate)}">${esc(gateLabelMap[item.decision_gate] || item.decision_gate)}</span>
            <span class="tag">${esc(quoteLabel(item))}</span>
          </div>`;
        root.appendChild(button);
      }
    }
    function renderDetail(item) {
      const gaps = (item.data_gaps || []).map(x => `<li>${esc(x)}</li>`).join("");
      const tasks = (item.deepsearch_tasks || []).map(x => `<li><code>${esc(x)}</code></li>`).join("");
      const warnings = (item.display_warnings || []).map(x => `<li>${esc(x)}</li>`).join("");
      document.getElementById("detail").innerHTML = `<h2>${esc(item.ticker)} ${esc(item.company_name)}</h2>
        <div class="metric"><b>分數 / 信心</b><span>${esc(item.buy_value_score)} / 100，${esc(item.score_confidence)}</span></div>
        <div class="metric"><b>價格位置</b><span>${esc(labelMap[item.price_position_snapshot] || item.price_position_snapshot)}</span></div>
        <div class="metric"><b>投資判斷狀態</b><span>${esc(gateLabelMap[item.decision_gate] || item.decision_gate)}</span></div>
        <div class="metric"><b>資料狀態</b><span>${esc(item.data_status)}，as_of ${esc(item.as_of || "unknown")}</span></div>
        <div class="metric"><b>Latest price</b><span>${esc(quoteDetail(item))}</span></div>
        <div class="metric"><b>Actionability</b><span>${esc(item.actionability)} / ${esc(item.decision_usefulness)}</span></div>
        <h2>研究摘要</h2><p>${esc(item.research_summary)}</p>
        <h2>資料缺口</h2><ul>${gaps || "<li>目前來源沒有列出明確 data gap；仍需依 point-in-time policy 檢查 freshness。</li>"}</ul>
        <h2>Deepsearch 任務</h2><ul>${tasks}</ul>
        ${warnings ? `<h2>呈現層警示</h2><ul>${warnings}</ul>` : ""}`;
    }
    function prioritySymbols() {
      const preferred = state.data.companies.filter(item => item.market === "US").map(item => item.ticker);
      const fallback = state.data.companies.map(item => item.ticker);
      return Array.from(new Set([...preferred, ...fallback])).slice(0, 8);
    }
    async function refreshQuotes() {
      const status = document.getElementById("quote-helper-status");
      try {
        const quotePort = new URLSearchParams(window.location.search).get("quotePort") || localStorage.getItem("quoteHelperPort") || "8765";
        const symbols = prioritySymbols().join(",");
        const res = await fetch(`http://localhost:${quotePort}/quotes?symbols=${encodeURIComponent(symbols)}`);
        if (!res.ok) throw new Error(`quote helper status ${res.status}`);
        const payload = await res.json();
        for (const quote of payload.quotes || []) state.quotes.set(quote.symbol, quote);
        state.quoteFailed = false;
        status.textContent = `Quote helper: ${payload.as_of || "connected"}`;
        renderCards();
        if (state.selected) renderDetail(state.selected);
      } catch (error) {
        state.quoteFailed = true;
        status.textContent = "Quote helper: live_price_unavailable";
        renderCards();
        if (state.selected) renderDetail(state.selected);
      }
    }
    for (const id of ["search", "market", "status"]) {
      document.getElementById(id).addEventListener("input", renderCards);
    }
    loadData();
  </script>
</body>
